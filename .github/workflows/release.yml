name: CI Build and Auto Documenter

on:
  push:
    branches:
      - main # Main branch'ine her push atıldığında otomatik çalışır

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v3

    - name: Dağıtım Klasörünü Oluştur
      run: mkdir -p dist

    - name: Tüm Lua Bileşenlerini Tek Dosyada Birleştir (Bundler)
      run: |
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        
        # Temiz bir source.lua oluştur ve başlığı yaz
        echo "-- [[ Otomatik Derlenmiş Universal GUI Kütüphanesi ]]" > dist/source.lua
        echo "-- Son Derleme Zamanı: $TIMESTAMP" >> dist/source.lua
        echo "-- Bu dosya GitHub Actions tarafından otomatik üretilmiştir. Elle düzenlemeyiniz." >> dist/source.lua
        echo -e "\n" >> dist/source.lua
        
        # 1. Modül: Tema ayarları
        echo "-- [Modül: Theme]" >> dist/source.lua
        cat src/Theme.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        # 2. Modüller: Arayüz Elementleri (Sırasıyla birleştirilir)
        echo "-- [Modül: Component - Button]" >> dist/source.lua
        cat src/Components/Button.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        # Buraya ileride Toggle, Slider gibi yeni ekleyeceğin elementleri alt alta tanımlayabilirsin:
        # echo "-- [Modül: Component - Toggle]" >> dist/source.lua
        # cat src/Components/Toggle.lua >> dist/source.lua || true
        # echo -e "\n" >> dist/source.lua
        
        # 3. Modül: Ana UI Motoru (Init en son eklenmelidir)
        echo "-- [Modül: Ana Motor]" >> dist/source.lua
        cat src/Init.lua >> dist/source.lua || true
        
        echo "Tüm kaynak kodlar dist/source.lua dosyasında başarıyla birleştirildi."

    - name: README.md Dosyasını Dinamik Olarak Güncelle
      run: |
        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        RAW_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/dist/source.lua"
        
        # README dosyasını sıfırdan oluşturup güncel loadstring linkini gömer
        cat << EOF > README.md
        # 🚀 Otomasyonlu Universal GUI Kütüphanesi
        
        Bu kütüphane modüler bir yapıda geliştirilmiştir. `src/` klasöründeki bağımsız bileşenler, her kod güncellenmesinde GitHub Actions tarafından otomatik olarak tek bir üretim dosyası haline getirilmektedir.
        
        ## 🛠️ Kurulum ve Kullanım (Loadstring)
        
        Aşağıdaki kodu Roblox executor'ınıza yapıştırarak kütüphaneyi en güncel haliyle anında çağırabilirsiniz:
        
        \`\`\`lua
        -- Son Güncelleme: $(date '+%Y-%m-%d %H:%M:%S')
        local MyGuiLib = loadstring(game:HttpGet("${RAW_URL}"))()
        
        -- Yeni Pencere Oluşturma
        local Window = MyGuiLib:CreateWindow("Otomatik Hub")
        
        -- Örnek Element Kullanımı
        Window:CreateButton("Test Butonu", function()
            print("Butona tıklandı!")
        end)
        \`\`\`
        
        ## 📦 Proje Klasör Mimarisi
        - \`src/\`: Geliştiriciler (senin için) izole bileşenlerin ve tasarımın bulunduğu alan.
        - \`dist/source.lua\`: Üretim ortamı için derlenmiş ve executor'ın okuyacağı nihai tek kod bloğu.
        
        _Bu dökümantasyon GitHub Actions iş akışı tarafından otomatik olarak optimize edilmektedir._
        EOF
        echo "README.md başarıyla dinamik olarak güncellendi."

    - name: Değişiklikleri Kaydet ve Push Et
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add dist/source.lua README.md
        git commit -m "chore(bot): otomatik build ve readme dökümantasyonu güncellendi [skip ci]" || echo "Değişiklik yok."
        git push
        
