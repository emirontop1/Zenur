name: CI Build and Auto Documenter

on:
  push:
    branches:
      - main # Ana şubeye (main) her kod gönderildiğinde tetiklenir

# 🚀 403 Hatalarını Engellemek İçin Gerekli Olan En Kritik Yazma İzni
permissions:
  contents: write

jobs:
  build-and-document:
    runs-on: ubuntu-latest

    steps:
    - name: Repo Kodlarını Çek
      uses: actions/checkout@v3

    - name: Dağıtım Klasörünü Doğrula
      run: mkdir -p dist

    - name: Tüm Lua Bileşenlerini Tek Dosyada Birleştir (Bundler)
      run: |
        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        
        # Temiz bir source.lua oluşturuyoruz
        echo "-- [[ WindUI Tabanlı Otomatik Derlenmiş Universal GUI Kütüphanesi ]]" > dist/source.lua
        echo "-- Son Derleme Zamanı: $TIMESTAMP" >> dist/source.lua
        echo "-- Bu dosya GitHub Actions botu tarafından otomatik üretilmiştir. Elle düzenlemeyiniz." >> dist/source.lua
        echo -e "\n" >> dist/source.lua
        
        # 1. Modül: Tema Ayarları
        echo "-- [Modül: Tasarım ve Temalar]" >> dist/source.lua
        cat src/Theme.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        # 2. Modüller: Arayüz Elementleri
        echo "-- [Modül: Component - Button]" >> dist/source.lua
        cat src/Components/Button.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        echo "-- [Modül: Component - Toggle]" >> dist/source.lua
        cat src/Components/Toggle.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        echo "-- [Modül: Component - Slider]" >> dist/source.lua
        cat src/Components/Slider.lua >> dist/source.lua || true
        echo -e "\n" >> dist/source.lua
        
        # 3. Modül: Ana UI Giriş Motoru (Her zaman en son eklenmelidir)
        echo "-- [Modül: Ana Pencere Yönetimi]" >> dist/source.lua
        cat src/Init.lua >> dist/source.lua || true
        
        echo "Tüm modüller dist/source.lua dosyasında başarıyla paketlendi (Bundled)."

    - name: README.md Dosyasını Sıfırdan ve Dinamik Güncelle
      run: |
        REPO_OWNER="${{ github.repository_owner }}"
        REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
        RAW_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/dist/source.lua"
        
        # README dosyasını sıfırdan yazar ve en güncel loadstring linkini gömer
        cat << EOF > README.md
        # 🚀 Gelişmiş Otomasyonlu GUI Kütüphanesi (WindUI Architecture)
        
        Bu proje modüler bir Roblox UI kütüphanesidir. \`src/\` klasöründeki bağımsız bileşen kodları (Button, Toggle, Slider), her güncellemede GitHub Actions tarafından tek bir üretim dosyasına dönüştürülür.
        
        ## 🛠️ Kurulum ve Script İçi Kullanım (Loadstring)
        
        Kütüphaneyi executor'ınızda çalıştırmak için aşağıdaki loadstring kodunu kullanabilirsiniz. Bu link her zaman otomatik güncellenir:
        
        \`\`\`lua
        -- Son Otomatik Derleme: $(date '+%Y-%m-%d %H:%M:%S')
        local WindUIModule = loadstring(game:HttpGet("${RAW_URL}"))()
        
        -- Yeni Pencere Oluşturma
        local Window = WindUIModule:CreateWindow({
            Title = "Gelişmiş Hub v1.0",
            Folder = "MyConfigFolder"
        })
        
        -- Buton Ekleme
        Window:CreateButton("Hileyi Aktif Et", function()
            print("Butona başarıyla tıklandı!")
        end)
        
        -- Toggle Ekleme
        Window:CreateToggle("Otomatik Vuruş (Aura)", false, function(state)
            print("Aura Durumu: ", state)
        end)
        
        -- Slider Ekleme
        Window:CreateSlider("Vuruş Menzili", 10, 50, 25, function(value)
            print("Yeni Menzil: ", value)
        end)
        \`\`\`
        
        ## 📦 Yapısal Mimari
        - \`src/\`: Modüler ve izole bileşen geliştirme klasörü (Geliştirici alanı).
        - \`dist/source.lua\`: Derlenmiş, tek parça nihai üretim kodu (Executor alanı).
        
        _Bu dökümantasyon GitHub Actions iş akışı tarafından otomatik olarak optimize edilmektedir._
        EOF
        echo "README.md başarıyla dinamik olarak güncellendi."

    - name: Değişiklikleri Güvenli Şekilde Kaydet ve Push Et
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Kimlik doğrulamalı güvenli URL enjeksiyonu (403 hatasını kesin çözer)
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
        
        git add dist/source.lua README.md
        git commit -m "chore(bot): otomatik derleme ve readme dökümantasyonu senkronize edildi [skip ci]" || echo "Değişiklik yok."
        git push origin main
        
